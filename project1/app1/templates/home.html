<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            display: flex;
            flex-direction:column;
            border: 2px solid;
            height: 500px;
            width: 300px;
            border-radius: 5px;
            justify-content: space-between;
            .inp{
                height: 40px;
                width: 190px;
               
                margin: auto;
            }
            button{
                height: 40px;
                width: 190px;
                margin: auto;
            }
        }
    </style>
</head>
<body>
    <form action="" method="post">
        {% csrf_token %}
        <input class="inp" type="text" name="id" placeholder="enter your id"><br>
        <input class="inp" type="text" name="name" placeholder="enter your name "><br>
        <input class="inp" type="text" name="age" placeholder="enter your age "><br>
        <input class="inp" type="text" name="course" placeholder="enter your course "><br>
        <input class="inp" type="text" name="phno" placeholder="enter your phone number"><br>
        <button type="submit">submit</button>
        
    </form>
    <table border="2px solid">
        <tr>
        <th>id</th>
        <th>name</th>
        <th>age</th>
        <th>course</th>
        <th>phone_number</th>
        </tr>
        {% for i in student %}
        <tr>
            <th> {{i.id1}}</th>
            <th>{{i.name}}</th>
            <th>{{i.age}}</th>
            <th>{{i.course}}</th>
            <th>{{i.phone}}</th>
        </tr>
        {% endfor %}
    </table>
</body>
</html>

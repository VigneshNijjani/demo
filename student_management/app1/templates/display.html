<!DOCTYPE html>
<html>
<head>
    <title>Students</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            margin:0;
            padding:20px;
        }

        h1{
            text-align:center;
            color:#333;
        }

        table{
            width:90%;
            margin:auto;
            border-collapse:collapse;
            background:white;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        th{
            background:#007bff;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f1f1f1;
        }

        a{
            text-decoration:none;
            padding:6px 12px;
            border-radius:5px;
            color:white;
        }

        .edit{
            background:green;
        }

        .delete{
            background:red;
        }

        .history{
            background:#333;
            display:inline-block;
            margin-bottom:15px;
        }
    </style>
</head>
<body>

    <h1>Student Records</h1>

    <a href="{% url 'history' %}" class="history">History</a>

    <table>
        <tr>
            <th>Name</th>
            <th>Roll No</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Branch</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>

        {% for i in student %}
        <tr>
            <td>{{ i.name }}</td>
            <td>{{ i.rollno }}</td>
            <td>{{ i.age }}</td>
            <td>{{ i.gender }}</td>
            <td>{{ i.branch }}</td>
            <td>{{ i.email }}</td>

            <td>
                <a href="{% url 'update' i.id %}" class="edit">Edit</a>

                <a href="{% url 'delete' i.id %}" class="delete">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}
    </table>

</body>
</html>

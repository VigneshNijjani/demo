<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student History Action</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card{
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2{
            margin-bottom: 20px;
            color: #333;
        }

        .btn{
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
        }

        .undo{
            background: green;
        }

        .delete{
            background: red;
        }

        .back{
            background: #007bff;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Student History Actions</h2>

        <a class="btn undo" href="{% url 'undo' student.id %}">
            Undo
        </a>

        <a class="btn delete" href="{% url 'p_delete' student.id %}">
            Permanent Delete
        </a>

        <br><br>

        <a class="btn back" href="{% url 'history' %}">
            Back
        </a>
    </div>

</body>
</html>

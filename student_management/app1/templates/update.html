<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        form{
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label{
            display: block;
            margin-top: 10px;
            font-weight: bold;
            color: #444;
        }

        input[type="text"],
        input[type="email"]{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        .gender{
            margin-top: 10px;
        }

        .gender input{
            margin-right: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }
    </style>
</head>
<body>

<form action="" method="post">
    {% csrf_token %}

    <h2>Update Student</h2>

    <label>Name</label>
    <input type="text" name="name" value="{{ student.name }}">

    <label>Age</label>
    <input type="text" name="age" value="{{ student.age }}">

    <label>Roll Number</label>
    <input type="text" name="rollno" value="{{ student.rollno }}">

    <div class="gender">
        <label>Gender</label>

        <input type="radio" name="gender" value="male"
        {% if student.gender == 'male' %}checked{% endif %}>
        Male

        <input type="radio" name="gender" value="female"
        {% if student.gender == 'female' %}checked{% endif %}>
        Female
    </div>

    <label>Branch</label>
    <input type="text" name="branch" value="{{ student.branch }}">

    <label>Email</label>
    <input type="email" name="email" value="{{ student.email }}">

    <button type="submit">Update Student</button>
</form>

</body>
</html>

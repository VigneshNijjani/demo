<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medicines</title>
  <style>
    

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

   

    
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 64px;
      padding: 0 30px;
      font-size: 26px;
      font-weight: 700;
      position: sticky;
      top: 0;
      width: 100%;
      background-color: rgb(100, 100, 200);
      color: white;
      box-shadow: 0 3px 20px rgba(0,0,0,0.2);
      z-index: 100;
    }

    nav > p {
      flex-shrink: 0;
    }

    
    ul {
      display: flex;
      align-items: center;
      list-style: none;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    li {
      font-size: 16px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      white-space: nowrap;
    }

    li:hover {
      background-color: white;
      color: rgb(100, 100, 200);
    }

    
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px 40px;
      gap: 16px;
      width: 100%;
    }

  
    #div1 {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

  
    #m1 {
      font-size: 26px;
      font-weight: 700;
      text-align: center;
      color: #333;
    }

    
    .search {
      width: 90%;
      max-width: 600px;
      display: flex;
    }

    .search input {
      flex: 1;
      padding: 11px 16px;
      border-radius: 15px 0 0 15px;
      border: 1.5px solid #aaa;
      border-right: none;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      background: white;
    }

    .search input:focus {
      border-color: rgb(100, 100, 200);
    }

    .search button {
      padding: 11px 22px;
      cursor: pointer;
      color: white;
      border: 1.5px solid rgb(100, 100, 200);
      border-left: none;
      border-radius: 0 15px 15px 0;
      background-color: rgb(100, 100, 200);
      font-size: 15px;
      font-family: inherit;
      font-weight: 600;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    .search button:hover {
      background-color: rgb(80, 80, 185);
    }

   
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 90%;
      max-width: 600px;
      color: #888;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #ccc;
    }

    .divider span {
      font-size: 15px;
      font-weight: 600;
    }

   
    #div2 {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 0;
    }

    #div2 p {
      font-size: 20px;
      font-weight: 600;
      color: #444;
      text-align: center;
    }

    
    #inp {
      display: block;
      margin: 0 auto;
      padding: 10px;
      border: 2px dashed rgb(100, 100, 200);
      border-radius: 10px;
      background: white;
      cursor: pointer;
      width: 90%;
      max-width: 400px;
      font-family: inherit;
      color: #555;
    }

    @media (min-width: 601px) and (max-width: 900px) {
      nav {
        font-size: 22px;
        padding: 0 20px;
      }

      li {
        font-size: 14px;
        padding: 5px 10px;
      }

      #m1 {
        font-size: 22px;
      }
    }

    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        height: auto;
        padding: 12px 16px;
        text-align: center;
        gap: 10px;
        font-size: 22px;
      }

      ul {
        justify-content: center;
        gap: 6px;
        width: 100%;
      }

      li {
        font-size: 14px;
        padding: 6px 12px;
        width: auto;
      }

      main {
        padding: 30px 16px 30px;
      }

      #m1 {
        font-size: 20px;
      }

      .search {
        width: 100%;
      }

      .search input {
        font-size: 14px;
        padding: 10px 12px;
      }

      .search button {
        font-size: 14px;
        padding: 10px 14px;
      }

      .divider {
        width: 100%;
      }

      #div2 p {
        font-size: 17px;
      }

      #inp {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <nav>
    <p>medicines</p>
    <ul>
      <li class="h1">order</li>
      <li class="h2">status</li>
      <li class="h3">about</li>
      <li class="h4">contact</li>
    </ul>
  </nav>

  <main>
    <div id="div1">
      <p id="m1">What Are You Looking For?</p>
      <form class="search">
        <input type="search" placeholder="Search here..." required />
        <button type="submit">Search</button>
      </form>
    </div>

    <div class="divider"><span>or</span></div>

    <div id="div2">
      <p>Order with Prescription</p>
      <input id="inp" type="file" accept="image/*,.pdf" />
    </div>
  </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical Login</title>
  <style>
  

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #eaf6f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    
    .box {
      background: white;
      padding: 36px 30px;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    h2 {
      text-align: center;
      color: rgb(117, 117, 228);
      font-size: 24px;
      margin-bottom: 10px;
    }

    
    label {
      font-size: 14px;
      font-weight: 600;
      color: #444;
      margin-left: 2px;
    }

    .inputbox {
      width: 100%;
      padding: 11px 14px;
      margin-top: 6px;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .inputbox:focus,
    .inputbox:hover {
      border-color: rgb(117, 117, 228);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .verify-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    #ver {
      background: none;
      border: none;
      color: rgb(117, 117, 228);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    #ver:hover {
      color: rgb(37, 37, 171);
    }

   
    #verify {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      color: white;
      background-color: rgb(117, 117, 228);
      font-size: 15px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 4px;
      text-decoration: none;
      display: block;
      text-align: center;
    }

    #verify:hover {
      background-color: rgb(90, 90, 210);
    }

   
    .signup-row {
      text-align: center;
      margin-top: 6px;
    }

    .signup-row a {
      color: rgb(117, 117, 228);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
    }

    .signup-row a:hover {
      color: rgb(37, 37, 171);
      text-decoration: underline;
    }

    @media (max-width: 400px) {
      .box {
        padding: 28px 18px;
      }

      h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Medical Login</h2>

    <div class="field-group">
      <label for="phonenumber">Phone Number</label>
      <input class="inputbox" id="phonenumber" type="text" placeholder="Enter Phone Number" />
      <div class="verify-row">
        <button id="ver">Send OTP</button>
      </div>
    </div>

    <!-- <div class="field-group"> -->
      <!-- <label for="otp">OTP</label> -->
      <!-- <input class="inputbox" id="otp" type="text" placeholder="Enter OTP" /> -->
    <!-- </div> -->

    
    <a id="verify" href="./dashboard1.html">Verify OTP</a>

    
    <div class="signup-row">
      <a href="./signup.html">Don't have an account? Sign up</a>
    </div>
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Employee</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form{
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        .inp{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background-color: #218838;
        }
    </style>
</head>
<body>

    <form action="" method="post">
        {% csrf_token %}
        
        <h2>Update Employee</h2>

        <input class="inp" type="text" name="name" value="{{emp.name}}">
        <input class="inp" type="text" name="age" value="{{emp.age}}">
        <input class="inp" type="text" name="dept" value="{{emp.dept}}">
        <input class="inp" type="text" name="sal" value="{{emp.sal}}">
        <input class="inp" type="text" name="company" value="{{emp.company}}">

        <button type="submit">Update</button>
    </form>

</body>
</html>
